name: 'Release VSCode Extension'

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm i

      - name: Update version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          ver=${{ github.ref_name }}
          ver=${ver:1}
          echo "Setting version to ${ver}"
          npm pkg set version=${ver}
          npm --prefix src-vscode pkg set version=${ver}

      - name: Build webview
        run: pnpm build:vscode

      - name: Build extension
        working-directory: src-vscode
        run: |
          npm run compile

      - name: Package extension
        working-directory: src-vscode
        run: |
          npm i -g @vscode/vsce
          vsce package
          mkdir -p vsix
          mv *.vsix vsix/

      - uses: actions/upload-artifact@v4
        with:
          name: maa-log-analyzer-extension
          path: 'src-vscode/vsix'

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: assets

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install vsce
        run: npm i -g @vscode/vsce

      - name: Publish
        run: |
          vsce publish -p ${{ secrets.VSCE_TOKEN }} --packagePath assets/maa-log-analyzer-extension/*.vsix
